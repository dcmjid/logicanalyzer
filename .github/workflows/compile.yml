name: Build LogicAnalyzer (Pico FIX FINAL)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential git

    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git --depth 1
        git -C pico-sdk submodule update --init
        echo "PICO_SDK_PATH=$(pwd)/pico-sdk" >> $GITHUB_ENV

    - name: Configure
      run: |
        mkdir -p build
        cd build
        cmake ../Firmware/LogicAnalyzer \
          -DPICO_SDK_PATH=$PICO_SDK_PATH \
          -DBOARD_TYPE=BOARD_PICO \
          -DPICO_BOARD=pico

    # 🔥 FIX CRITIQUE ICI
    - name: Fix broken include in generated file
      run: |
        sed -i 's|#include "../LogicAnalyzer_Board_Settings.h"|#include "LogicAnalyzer_Board_Settings.h"|g' build/LogicAnalyzer.pio.h

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: logic-analyzer-pico
        path: |
          build/*.uf2
          build/*.elf
