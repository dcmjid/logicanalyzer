name: Compile Pico Firmware

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère votre code source
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Récupère le SDK Pico (remplace le git clone manuel)
      - name: Checkout Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk
          submodules: true
          fetch-depth: 1

      # 3. Installe les outils de compilation
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      # 4. Compilation avec chemins explicites
      - name: Build Firmware
        run: |
          # On définit le chemin absolu du SDK pour CMake
          export PICO_SDK_PATH=${{ github.workspace }}/pico-sdk
          cd Firmware
          mkdir build
          cd build
          cmake .. -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk
          make -j$(nproc)

      # 5. Récupération du fichier binaire
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logic-analyzer-firmware
          path: Firmware/build/*.uf2
