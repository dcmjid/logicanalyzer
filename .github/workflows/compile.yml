name: Build LogicAnalyzer (Pico SIMPLE)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential git

    - name: Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git --depth 1
        git -C pico-sdk submodule update --init
        echo "PICO_SDK_PATH=$(pwd)/pico-sdk" >> $GITHUB_ENV

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake ../Firmware/LogicAnalyzer \
          -DPICO_SDK_PATH=$PICO_SDK_PATH \
          -DBOARD_TYPE=BOARD_PICO \
          -DPICO_BOARD=pico

    # ✅ FIX SIMPLE ET FIABLE
    - name: Fix broken include
      run: |
        find build -name "*.pio.h" -exec sed -i 's|../LogicAnalyzer_Board_Settings.h|LogicAnalyzer_Board_Settings.h|g' {} +

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build/*.uf2
