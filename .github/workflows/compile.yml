name: Compile Pico Firmware

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Download Pico SDK
        run: |
          git clone --depth 1 https://github.com $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init --depth 1

      - name: Compile
        run: |
          export PICO_SDK_PATH=$HOME/pico-sdk
          cd Firmware
          mkdir build
          cd build
          # On force CMake à voir le fichier dans le dossier parent
          cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: logic-analyzer-binary
          path: Firmware/build/*.uf2
